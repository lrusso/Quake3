      #email{position:fixed;right:0;bottom:0;padding-right:15px;line-height:3.2;font-family:Arial;font-size:16px;color:#fff;user-select:none;-webkit-user-select:none}
      #email a{text-decoration:none;color:#fff;background-color:transparent;border:0;outline:0}
      #email a:focus{text-decoration: none; outline:1px solid #fff}
      #demo-loader{display:none;position:fixed;left:0;bottom:10px;right:0;width:64px;height:64px;margin:0 auto;filter:drop-shadow(2px 2px 2px #000);cursor:pointer;background-color:transparent;border:0;outline:0}
      #demo-loader:focus{outline:1px solid #fff}
      #demo-loader:hover{filter:brightness(110%)}
      #file-selector{display:none;position:fixed;left:0;bottom:10px;right:0;width:64px;height:64px;margin:0 auto;filter:drop-shadow(2px 2px 2px #000);cursor:pointer;background-color:transparent;border:0;outline:0}
      #file-selector:focus{outline:1px solid #fff}
      #file-selector:hover{filter:brightness(110%)}

      #canvas{width:100vw}

      .pleasewait{position:fixed;width:64px;height:64px;left:0;right:0;top:0;bottom:0;margin:auto auto;border:0}
      .lds-spinner{color:#fff;display:inline-block;position:relative;width:64px;height:64px}
      .lds-spinner div{transform-origin:32px 32px;animation:lds-spinner 1.2s linear infinite}
      .lds-spinner div:after{content:" ";display:block;position:absolute;top:3px;left:29px;width:5px;height:14px;border-radius:20%;background:#fff}
      .lds-spinner div:nth-child(1){transform:rotate(0deg);animation-delay:-1.1s}
      .lds-spinner div:nth-child(2){transform:rotate(30deg);animation-delay:-1s}
      .lds-spinner div:nth-child(3){transform:rotate(60deg);animation-delay:-.9s}
      .lds-spinner div:nth-child(4){transform:rotate(90deg);animation-delay:-.8s}
      .lds-spinner div:nth-child(5){transform:rotate(120deg);animation-delay:-.7s}
      .lds-spinner div:nth-child(6){transform:rotate(150deg);animation-delay:-.6s}
      .lds-spinner div:nth-child(7){transform:rotate(180deg);animation-delay:-.5s}
      .lds-spinner div:nth-child(8){transform:rotate(210deg);animation-delay:-.4s}
      .lds-spinner div:nth-child(9){transform:rotate(240deg);animation-delay:-.3s}
      .lds-spinner div:nth-child(10){transform:rotate(270deg);animation-delay:-.2s}
      .lds-spinner div:nth-child(11){transform:rotate(300deg);animation-delay:-.1s}
      .lds-spinner div:nth-child(12){transform:rotate(330deg);animation-delay:0s}
      @keyframes lds-spinner{0%{opacity:1}to{opacity:0}}
    </style>

      window.addEventListener("load", function () {
        if (window.top === window.self) {
          pleaseWait.style.display = "none"
          container.style.display = "block"

          var currentURL = new URL(window.location.href).searchParams
          var demoRequired = currentURL.has("demo")
          var useCustomProfile = currentURL.has("lrusso")

          if (demoRequired) {
            demoLoader.style.display = "block"
            demoLoader.tabIndex = 1
          } else {
            fileSelector.style.display = "block"
            fileSelector.tabIndex = 1
          }

          gameWrapper.addEventListener("contextmenu", function (event) {
            event.preventDefault()
          })

          fileSelector.addEventListener("click", function () {
            fileInput.click()
          })

          demoLoader.addEventListener("click", function () {
            container.style.display = "none"
            pleaseWait.style.display = "block"

            // no fetch here because the entire project
            // is compatible with pre 2015 environments.
            var xhr = new XMLHttpRequest()
            xhr.open("GET", "DEMO.pk3", true)
            xhr.responseType = "arraybuffer"
            xhr.onreadystatechange = function () {
              if (xhr.readyState === 4 && xhr.status === 200) {
                var generatedArguments =
                  '+set sv_pure 0\n+set net_enabled 0\n+set r_mode 4\n+set r_fullscreen 0\n+set r_overBrightBits 0\n+set com_basegame "demoq3"\n+set fs_basegame ""\n+set fs_game ""\n'

                ioquake3({
                  canvas: gameWrapper,
                  arguments: generatedArguments.trim().split(/\s+/),
                  locateFile: function locateFile(file) {
                    return file
                  },
                  print: function print(_text) {},
                  printErr: function printErr(_text) {},
                  onExit: function onExit(_code) {
                    window.location.reload()
                  },
                  preRun: [
                    function (module) {
                      try {
                        ioq3Module = module

                        module.addRunDependency("setup-ioq3-filesystem")

                        module.FS.mkdirTree("/demoq3/vm")
                        module.FS.mkdirTree("/home/web_user/.config/Quake3/demoq3")
                        module.FS.writeFile(
                          "/demoq3/vm/ui.qvm",
                          Uint8Array.fromBase64(UI_QVM)
                        )
                        module.FS.writeFile(
                          "/demoq3/vm/cgame.qvm",
                          Uint8Array.fromBase64(UI_CGAME)
                        )

                        if (useCustomProfile) {
                          module.FS.writeFile(
                            "/demoq3/q3config.cfg",
                            Uint8Array.fromBase64(myProfile)
                          )
                        }

                        module.FS.writeFile(
                          "/demoq3/pak0.pk3",
                          new Uint8Array(xhr.response)
                        )
                        module.removeRunDependency("setup-ioq3-filesystem")
                      } catch (err) {
                        //
                      }
                    },
                  ],
                  postRun: [
                    function () {
                      pleaseWait.style.display = "none"
                    },
                  ],
                })
              }
            }

            xhr.send(null)
          })

          fileInput.addEventListener("change", function (event) {
            var files = event.target.files
            var hasPk3 = false

            for (var i = 0; i < files.length; i++) {
              if (
                files[i].name.toLowerCase().indexOf(".pk3") ===
                files[i].name.length - 4
              ) {
                hasPk3 = true
                if (files[i].name.toLowerCase() === "pak4.pk3") {
                  io3Path = "baseq3"
                }
              }
            }

            if (!hasPk3) {
              location.reload()
              return
            }

            container.style.display = "none"
            pleaseWait.style.display = "block"

            var generatedArguments =
              '+set sv_pure 0\n+set net_enabled 0\n+set r_mode 4\n+set r_fullscreen 0\n+set r_overBrightBits 0\n+set com_basegame "' +
              io3Path +
              '"\n+set fs_basegame ""\n+set fs_game ""\n'

            ioquake3({
              canvas: gameWrapper,
              arguments: generatedArguments.trim().split(/\s+/),
              locateFile: function locateFile(file) {
                return file
              },
              print: function print(_text) {},
              printErr: function printErr(_text) {},
              onExit: function onExit(_code) {
                window.location.reload()
              },
              preRun: [
                function (module) {
                  try {
                    ioq3Module = module

                    module.addRunDependency("setup-ioq3-filesystem")

                    module.FS.mkdirTree("/" + io3Path + "/vm")
                    module.FS.mkdirTree(
                      "/home/web_user/.config/Quake3/" + io3Path + ""
                    )

                    module.FS.writeFile(
                      "/" + io3Path + "/vm/ui.qvm",
                      Uint8Array.fromBase64(UI_QVM)
                    )

                    module.FS.writeFile(
                      "/" + io3Path + "/vm/cgame.qvm",
                      Uint8Array.fromBase64(UI_CGAME)
                    )

                    if (useCustomProfile) {
                      module.FS.writeFile(
                        "/" + io3Path + "/q3config.cfg",
                        Uint8Array.fromBase64(myProfile)
                      )
                    }

                    var remaining = files.length

                    function makeReader(idx) {
                      var reader = new FileReader()
                      reader.onload = function () {
                        if (files[idx].name === "q3config.cfg") {
                          module.FS.writeFile(
                            "/home/web_user/.config/Quake3/" +
                              io3Path +
                              "/q3config.cfg",
                            new Uint8Array(reader.result)
                          )
                        } else {
                          module.FS.writeFile(
                            "/" + io3Path + "/" + files[idx].name,
                            new Uint8Array(reader.result)
                          )
                        }

                        remaining = remaining - 1

                        if (remaining === 0) {
                          module.removeRunDependency("setup-ioq3-filesystem")
                        }
                      }
                      reader.readAsArrayBuffer(files[idx])
                    }

                    for (var j = 0; j < files.length; j++) {
                      makeReader(j)
                    }
                  } catch (err) {
                    //
                  }
                },
              ],
              postRun: [
                function () {
                  pleaseWait.style.display = "none"
                },
              ],
            })
          })

          function downloadProfileFileQuake3() {
            try {
              if (container.style.display !== "none") {
                return
              }

              var rawReading = ioq3Module.FS.readFile(
                "/home/web_user/.config/Quake3/" + io3Path + "/q3config.cfg"
              )
              var fileAsArray = new Uint8Array(rawReading)
              var blob = new Blob([fileAsArray], {
                type: "application/octet-stream",
              })
              var url = window.URL.createObjectURL(blob)
              var a
              a = document.createElement("a")
              a.href = url
              a.download = "q3config.cfg"
              document.body.appendChild(a)
              a.style = "display: none"
              a.click()
              a.remove()
            } catch (err) {
              //
            }
          }

          function requestFullscreenQuake3() {
            try {
              if (container.style.display !== "none") {
                return
              }

              var docEl = document.body

              var requestFull =
                docEl.requestFullscreen ||
                docEl.mozRequestFullScreen ||
                docEl.webkitRequestFullscreen ||
                docEl.msRequestFullscreen

              var isFull =
                docEl.fullscreenElement ||
                docEl.mozFullScreenElement ||
                docEl.webkitFullscreenElement ||
                docEl.msFullscreenElement

              if (!isFull) {
                if (requestFull) {
                  requestFull.call(docEl)
                }
              }
            } catch (err) {
              //
            }
          }

          window.addEventListener("keydown", function (event) {
            var KEY_CTRL = event.ctrlKey || event.metaKey
            var KEY_P = event.code === "KeyP"
            var KEY_F = event.code === "KeyF"

            if (KEY_CTRL && KEY_P) {
              event.preventDefault()
              downloadProfileFileQuake3()
            }

            if (KEY_CTRL && KEY_F) {
              event.preventDefault()
              requestFullscreenQuake3()
            }
          })

          // fix for mobile devices
          function resizeCanvas() {
            setTimeout(function () {
              gameWrapper.style.width = window.innerWidth + "px"
              gameWrapper.style.height = window.innerHeight + "px"
            }, 200)
          }
          window.addEventListener("resize", resizeCanvas, false)
          window.addEventListener("orientationchange", resizeCanvas, false)

          resizeCanvas()
        }
      })

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("worker.js")
          .then(function (registration) {
            // Registration successful
            //console.log("ServiceWorker registration successful with scope: " + registration.scope);
          })
          .catch(function (err) {
            // Registration failed
            //console.log("ServiceWorker registration failed: " + err);
          })
      }
