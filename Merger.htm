      var picker = document.getElementById("picker")
      var mergeBtn = document.getElementById("merge")
      var log = document.getElementById("log")
      var dl = document.getElementById("download")

      function append(line) {
        log.textContent = log.textContent + line + "\n"
        log.scrollTop = log.scrollHeight
      }

      function replaceLast(line) {
        var parts = log.textContent.split("\n")
        if (parts.length >= 2) {
          parts[parts.length - 2] = line
        } else {
          parts[0] = line
        }
        log.textContent = parts.join("\n")
        log.scrollTop = log.scrollHeight
      }

      function fmtMB(n) {
        return (n / 1048576).toFixed(1) + " MB"
      }

      function countFiles(zip) {
        var keys = Object.keys(zip.files)
        var n = 0

        for (var i = 0; i < keys.length; i = i + 1) {
          if (!zip.files[keys[i]].dir) {
            n = n + 1
          }
        }

        return n
      }

      function withCallback(promise, cb) {
        promise.then(
          function (result) {
            cb(null, result)
          },
          function (err) {
            cb(err)
          }
        )
      }

      function readFileAsArrayBuffer(file, onProgress, cb) {
        var reader = new FileReader()
        reader.onload = function (e) {
          cb(null, e.target.result)
        }
        reader.onerror = function () {
          cb(reader.error)
        }
        if (onProgress) {
          reader.onprogress = function (e) {
            if (e.lengthComputable) {
              onProgress(e.loaded, e.total)
            }
          }
        }
        reader.readAsArrayBuffer(file)
      }

      // walk every entry of a loaded zip sequentially, copying it into `merged`.
      // calls cb(err) when done.
      function copyEntries(zip, merged, fileName, cb) {
        var names = Object.keys(zip.files)
        var totalEntries = names.length
        var i = 0
        var added = 0
        function step() {
          // directory entries have no content: recreate them synchronously so
          // empty folders are preserved (file-bearing folders are auto-created
          // by merged.file(), but empty ones would otherwise be lost).
          while (i < totalEntries && zip.files[names[i]].dir) {
            merged.folder(names[i]) // idempotent — later paks reuse the folder
            i = i + 1
          }
          if (i >= totalEntries) {
            replaceLast(
              "reading " +
                fileName +
                ": " +
                added +
                " files added (merged total: " +
                countFiles(merged) +
                ")"
            )
            cb(null)
            return
          }
          var name = names[i]
          i = i + 1
          var entry = zip.files[name]
          withCallback(entry.async("uint8array"), function (err, content) {
            if (err) {
              cb(err)
              return
            }
            merged.file(name, content) // same name overwrites — later paks win
            added = added + 1
            // throttle dom updates: every 50 entries (or on the last one).
            if (i % 50 === 0 || i === totalEntries) {
              replaceLast(
                "reading " +
                  fileName +
                  ": copying entries " +
                  i +
                  "/" +
                  totalEntries +
                  " (" +
                  added +
                  " files added)..."
              )
            }
            step()
          })
        }
        step()
      }

      // process one pk3: read it, load it as a zip, copy its entries into `merged`.
      // calls cb(err) when done.
      function processOne(merged, file, cb) {
        append("reading " + file.name + " 0% of " + fmtMB(file.size) + "...")
        readFileAsArrayBuffer(
          file,
          function (loaded, total) {
            var pct = total ? Math.round((loaded / total) * 100) : 0
            replaceLast(
              "reading " +
                file.name +
                " " +
                pct +
                "% of " +
                fmtMB(total) +
                " (" +
                fmtMB(loaded) +
                " read)..."
            )
          },
          function (err, buf) {
            if (err) {
              cb(err)
              return
            }
            replaceLast(
              "reading " + file.name + ": parsing ZIP central directory..."
            )
            withCallback(JSZip.loadAsync(buf), function (err2, zip) {
              if (err2) {
                cb(err2)
                return
              }
              replaceLast(
                "reading " +
                  file.name +
                  ": copying entries 0/" +
                  Object.keys(zip.files).length +
                  "..."
              )
              copyEntries(zip, merged, file.name, cb)
            })
          }
        )
      }

      picker.addEventListener("change", function () {
        mergeBtn.disabled = picker.files.length === 0
        dl.style.display = "none"
        log.textContent = picker.files.length + " file(s) selected.\n"
      })

      mergeBtn.addEventListener("click", function () {
        mergeBtn.disabled = true
        picker.disabled = true
        dl.style.display = "none"
        log.textContent = ""

        // sort by filename so pak0..pak8 are processed in order
        // (later overrides earlier — quake 3 load order).
        var files = Array.prototype.slice.call(picker.files).sort(function (a, b) {
          if (a.name < b.name) {
            return -1
          }
          if (a.name > b.name) {
            return 1
          }
          return 0
        })

        var merged = new JSZip()

        function finish(err) {
          if (err) {
            append("ERROR: " + (err && err.message ? err.message : String(err)))
          }
          mergeBtn.disabled = false
          picker.disabled = false
        }

        function compressAndDownload() {
          append("creating Quake III Arena.pk3... 0%")
          withCallback(
            merged.generateAsync(
              {
                type: "blob",
                compression: "DEFLATE",
                compressionOptions: { level: 9 },
                mimeType: "application/octet-stream",
              },
              function (m) {
                replaceLast(
                  "creating Quake III Arena.pk3... " + Math.round(m.percent) + "%"
                )
              }
            ),
            function (err, blob) {
              if (err) {
                finish(err)
                return
              }
              append(
                "done: " +
                  blob.size.toLocaleString() +
                  " bytes (" +
                  fmtMB(blob.size) +
                  ")"
              )
              dl.href = URL.createObjectURL(blob)
              dl.textContent =
                "↓ Download Quake III Arena.pk3 (" + fmtMB(blob.size) + ")"
              dl.style.display = "inline-block"
              finish(null)
            }
          )
        }

        // sequentially process each pak via callback chain
        function processNext(idx) {
          if (idx >= files.length) {
            compressAndDownload()
            return
          }
          processOne(merged, files[idx], function (err) {
            if (err) {
              finish(err)
              return
            }
            processNext(idx + 1)
          })
        }

        processNext(0)
      })
    </script>
  </body>
